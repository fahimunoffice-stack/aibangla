<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50"/>
      <stop offset="100%" style="stop-color:#81c784"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- Circuit/AI pattern lines -->
  <g stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.3">
    <circle cx="128" cy="128" r="48"/>
    <circle cx="384" cy="384" r="48"/>
    <line x1="128" y1="128" x2="256" y2="256"/>
    <line x1="384" y1="384" x2="256" y2="256"/>
    <circle cx="256" cy="256" r="8" fill="url(#accent)" stroke="none"/>
  </g>

  <!-- Bengali letter "অ" (O) stylized -->
  <g transform="translate(256, 280)">
    <!-- Main curve -->
    <path d="M-80,-60 Q-80,-100 0,-100 Q80,-100 80,-60 Q80,-20 40,-20 Q0,-20 0,20"
          fill="none" stroke="url(#accent)" stroke-width="24" stroke-linecap="round"/>
    <!-- Vertical stroke -->
    <line x1="0" y1="-100" x2="0" y2="60" stroke="url(#accent)" stroke-width="24" stroke-linecap="round"/>
    <!-- Bottom curve -->
    <path d="M-60,60 Q0,100 60,60"
          fill="none" stroke="url(#accent)" stroke-width="24" stroke-linecap="round"/>
  </g>

  <!-- AI dot -->
  <circle cx="350" cy="150" r="20" fill="url(#accent)"/>
</svg>
